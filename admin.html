<script>
    if (localStorage.getItem('serhat_admin_yetkisi') !== 'onaylandi') {
        window.location.href = '/admin-giris';
    }
</script>

<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yönetim Paneli | Serhat Optik</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        body { background-color: #f8f9fa; font-family: 'Inter', sans-serif; }
        .sidebar { background-color: #0f172a; min-height: 100vh; width: 260px; position: fixed; z-index: 10; }
        .main-content { margin-left: 260px; padding: 30px; }
        .table-image { width: 50px; height: 50px; object-fit: cover; border-radius: 6px; }

        /* Sidebar Linklerinin Genel Hali */
        .sidebar a {
            padding: 15px 20px;
            color: #94a3b8; 
            text-decoration: none;
            display: block;
            transition: all 0.3s ease; 
            border-left: 4px solid transparent; 
        }
        .sidebar a:hover {
            background: #334155;
            color: #ffffff;
        }
        .sidebar a.active, .sidebar a:focus, .sidebar a:active {
            background: linear-gradient(90deg, #3b82f6, #2563eb); 
            color: #ffffff !important;
            border-left: 4px solid #ffffff; 
            outline: none !important; 
        }
        .sidebar a i {
            width: 25px; 
            text-align: center;
        }
    </style>
</head>

<body>
    <div class="sidebar pt-4 d-flex flex-column">
        <div class="text-center mb-4">
            <h4 class="text-white fw-bold">SERHAT OPTİK</h4>
            <span class="badge bg-primary">Admin Panel</span>
        </div>

        <div class="menu-items flex-grow-1">
            <a href="#" onclick="sayfaDegistir('dashboard', this)" class="nav-link active">
                <i class="bi bi-box-seam me-2"></i> Ürün Yönetimi
            </a>
            <a href="#" onclick="sayfaDegistir('siparisler', this)" class="nav-link">
                <i class="bi bi-receipt me-2"></i> Siparişler
            </a>
            <a href="#" onclick="sayfaDegistir('kullanicilar', this)" class="nav-link">
                <i class="bi bi-people me-2"></i> Kullanıcı Yönetimi
            </a>
            <a href="/" class="nav-link"><i class="bi bi-shop me-2"></i> Mağazaya Dön</a>
        </div>

        <div class="sidebar-footer p-3">
            <button class="btn btn-outline-danger w-100" onclick="localStorage.removeItem('serhat_admin_yetkisi'); window.location.href='/admin-giris';">
                <i class="bi bi-box-arrow-left me-2"></i> Çıkış Yap
            </button>
        </div>
    </div>

    <div class="main-content">
        <!-- 1. ÜRÜN YÖNETİMİ -->
        <div id="sayfa-dashboard">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2 class="fw-bold text-dark m-0">Ürün Yönetimi</h2>
                <button class="btn btn-primary fw-bold px-4" onclick="modalAc('ekle')">
                    <i class="bi bi-plus-lg me-1"></i> Yeni Ürün Ekle
                </button>
            </div>
            <div class="card border-0 shadow-sm">
                <div class="card-body p-0 table-responsive">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="table-light">
                            <tr><th class="ps-4">Görsel</th><th>Ürün Adı</th><th>Kategori</th><th>Fiyat</th><th>Stok</th><th class="text-end pe-4">İşlemler</th></tr>
                        </thead>
                        <tbody id="admin-urun-listesi"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- 2. SİPARİŞ YÖNETİMİ -->
        <div id="sayfa-siparisler" class="d-none">
            <h2 class="fw-bold text-dark mb-4">Müşteri Siparişleri</h2>
            <div class="card border-0 shadow-sm">
                <div class="card-body p-0 table-responsive">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="table-light">
                            <tr><th>Sipariş No</th><th>Müşteri</th><th>Ürün</th><th>Adres</th><th>Fiyat</th><th>Durum</th><th>İşlem</th></tr>
                        </thead>
                        <tbody id="adminSiparisListesi"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- 3. KULLANICI YÖNETİMİ -->
        <div id="sayfa-kullanicilar" class="d-none">
            <h2 class="fw-bold text-dark mb-4">Sistem Kullanıcıları</h2>
            <div class="card border-0 shadow-sm">
                <div class="card-body p-0 table-responsive">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="table-light">
                            <tr>
                                <th class="ps-4">ID</th>
                                <th>Ad Soyad</th>
                                <th>Kullanıcı Adı</th>
                                <th>E-posta</th>
                                <th>Rol (Yetki)</th>
                                <th class="text-end pe-4">Aksiyonlar</th>
                            </tr>
                        </thead>
                        <tbody id="kullaniciListesi"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- ÜRÜN MODALI -->
    <div class="modal fade" id="urunModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content shadow-lg border-0">
                <div class="modal-header bg-dark text-white">
                    <h5 class="modal-title" id="modalBaslik">Ürün İşlemi</h5>
                    <button class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body p-4">
                    <form id="urunFormu">
                        <input type="hidden" id="urun_id">
                        <div class="mb-3">
                            <label class="form-label fw-bold">Ürün Adı</label>
                            <input type="text" id="urun_adi" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold">Kategori</label>
                            <select id="kategori" class="form-select"></select>
                        </div>
                        <div class="row">
                            <div class="col-6 mb-3">
                                <label class="form-label fw-bold">Fiyat (TL)</label>
                                <input type="number" id="fiyat" class="form-control" required>
                            </div>
                            <div class="col-6 mb-3">
                                <label class="form-label fw-bold">Stok Adedi</label>
                                <input type="number" id="stok" class="form-control" required>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold">Görsel URL</label>
                            <input type="url" id="resim_url" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold">Açıklama</label>
                            <textarea id="aciklama" class="form-control" rows="3"></textarea>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button class="btn btn-secondary" data-bs-dismiss="modal">İptal</button>
                    <button class="btn btn-primary px-4" onclick="urunKaydet()">Kaydet</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        let tumUrunler = [];
        
        // --- SAYFA YÖNETİMİ ---
        function sayfaDegistir(hedefSayfa, element) {
            document.getElementById('sayfa-dashboard').classList.add('d-none');
            document.getElementById('sayfa-siparisler').classList.add('d-none');
            document.getElementById('sayfa-kullanicilar').classList.add('d-none');
            
            document.getElementById('sayfa-' + hedefSayfa).classList.remove('d-none');

            document.querySelectorAll('.nav-link').forEach(link => link.classList.remove('active'));
            element.classList.add('active');

            if (hedefSayfa === 'dashboard') adminUrunleriGetir();
            if (hedefSayfa === 'siparisler') tumSiparisleriGetir();
            if (hedefSayfa === 'kullanicilar') kullanicilariGetir();
        }

        // --- ÜRÜN FONKSİYONLARI ---
        function adminUrunleriGetir() {
            fetch('/api/urunler')
                .then(res => res.json())
                .then(urunler => {
                    tumUrunler = urunler;
                    const liste = document.getElementById("admin-urun-listesi");
                    liste.innerHTML = urunler.map(u => `
                        <tr>
                            <td class="ps-4"><img src="${u.resim_url}" class="table-image"></td>
                            <td class="fw-bold">${u.urun_adi}</td>
                            <td><span class="badge bg-secondary">${u.kategori}</span></td>
                            <td>${parseFloat(u.fiyat).toLocaleString('tr-TR')} TL</td>
                            <td>
                                <span class="badge ${u.stok > 5 ? 'bg-success' : (u.stok > 0 ? 'bg-warning' : 'bg-danger')}">
                                    ${u.stok} Adet
                                </span>
                            </td>
                            <td class="text-end pe-4">
                                <button class="btn btn-sm btn-outline-primary me-2" onclick="modalAc('duzenle', ${u.id})"><i class="bi bi-pencil"></i></button>
                                <button class="btn btn-sm btn-outline-danger" onclick="urunSil(${u.id})"><i class="bi bi-trash"></i></button>
                            </td>
                        </tr>
                    `).join('');
                });
        }

        function modalAc(mod, id = null) {
            const form = document.getElementById("urunFormu");
            const kategoriSelect = document.getElementById("kategori");
            const kategoriler = [...new Set(tumUrunler.map(u => u.kategori))];
            
            kategoriSelect.innerHTML = kategoriler.map(kat => `<option value="${kat}">${kat}</option>`).join('');

            form.reset();
            document.getElementById("urun_id").value = id || "";

            if (mod === 'ekle') {
                document.getElementById("modalBaslik").innerText = "Yeni Ürün Ekle";
            } else {
                document.getElementById("modalBaslik").innerText = "Ürünü Düzenle";
                const u = tumUrunler.find(x => x.id === id);
                if(u) {
                    document.getElementById("urun_adi").value = u.urun_adi;
                    kategoriSelect.value = u.kategori; 
                    document.getElementById("fiyat").value = u.fiyat;
                    document.getElementById("stok").value = u.stok;
                    document.getElementById("resim_url").value = u.resim_url;
                }
            }
            new bootstrap.Modal(document.getElementById('urunModal')).show();
        } 
        
        async function urunKaydet() {
            const id = document.getElementById("urun_id").value;
            const veri = {
                urun_adi: document.getElementById("urun_adi").value,
                kategori: document.getElementById("kategori").value,
                fiyat: parseFloat(document.getElementById("fiyat").value),
                stok: parseInt(document.getElementById("stok").value),
                resim_url: document.getElementById("resim_url").value,
                aciklama: document.getElementById("aciklama").value
            };

            if (!veri.urun_adi || isNaN(veri.fiyat) || isNaN(veri.stok)) {
                return alert("Kral, Fiyat ve Stok kısımlarını sayısal bir değerle doldurman lazım!");
            }

            const url = id ? `/api/admin/urunler/${id}` : `/api/admin/urunler`;
            const method = id ? 'PUT' : 'POST';

            try {
                const res = await fetch(url, { method, headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(veri) });
                const sonuc = await res.json();
                
                if (sonuc.success) {
                    const modalEl = document.getElementById('urunModal');
                    bootstrap.Modal.getInstance(modalEl).hide();
                    adminUrunleriGetir();
                } else {
                    alert("Veritabanı reddetti: " + sonuc.message);
                }
            } catch (err) { alert("Bir hata oluştu!"); }
        }

        async function urunSil(id) {
            if (!confirm("Bu ürünü silmek istediğine emin misin kral?")) return;
            try {
                const res = await fetch(`/api/admin/urunler/${id}`, { method: 'DELETE' });
                const sonuc = await res.json();
                if (sonuc.success) adminUrunleriGetir();
            } catch (err) { console.error(err); }
        }

        // --- SİPARİŞ FONKSİYONLARI ---
        async function tumSiparisleriGetir() {
            try {
                const res = await fetch('/api/admin/siparisler');
                const data = await res.json();

                if (data.success) {
                    const tbody = document.getElementById('adminSiparisListesi');
                    tbody.innerHTML = ''; 
                    const gruplar = data.siparisler.reduce((acc, curr) => {
                        if (!acc[curr.siparis_no]) acc[curr.siparis_no] = [];
                        acc[curr.siparis_no].push(curr);
                        return acc;
                    }, {});

                    Object.keys(gruplar).forEach(siparisNo => {
                        const urunler = gruplar[siparisNo];
                        const ilkUrun = urunler[0]; 
                        const urunListesiHtml = urunler.map(u => `<div class="border-bottom py-1">${u.urun_adi} <span class="text-muted">(x${u.adet})</span></div>`).join('');
                        const toplamFiyat = urunler.reduce((toplam, u) => toplam + (parseFloat(u.fiyat) * u.adet), 0);

                        let badgeClass = 'bg-warning text-dark';
                        if (ilkUrun.durum === 'Kargolandı') badgeClass = 'bg-primary';
                        if (ilkUrun.durum === 'Teslim Edildi') badgeClass = 'bg-success';
                        if (ilkUrun.durum === 'İptal Edildi') badgeClass = 'bg-danger';

                        tbody.innerHTML += `
                            <tr>
                                <td><strong>${siparisNo}</strong></td>
                                <td>${ilkUrun.kullanici_eposta}</td>
                                <td>${urunListesiHtml}</td>
                                <td style="max-width: 200px; word-wrap: break-word;"><small class="text-muted">${ilkUrun.adres || 'Adres Yok'}</small></td>
                                <td><strong>${toplamFiyat.toLocaleString('tr-TR')} TL</strong></td>
                                <td><span class="badge ${badgeClass}">${ilkUrun.durum}</span></td>
                                <td>
                                    <select class="form-select form-select-sm" onchange="siparisNoDurumGuncelle('${siparisNo}', this.value)">
                                        <option value="Hazırlanıyor" ${ilkUrun.durum === 'Hazırlanıyor' ? 'selected' : ''}>Hazırlanıyor</option>
                                        <option value="Kargolandı" ${ilkUrun.durum === 'Kargolandı' ? 'selected' : ''}>Kargolandı</option>
                                        <option value="Teslim Edildi" ${ilkUrun.durum === 'Teslim Edildi' ? 'selected' : ''}>Teslim Edildi</option>
                                        <option value="İptal Edildi" ${ilkUrun.durum === 'İptal Edildi' ? 'selected' : ''}>İptal Edildi</option>
                                    </select>
                                </td>
                            </tr>
                        `;
                    });
                }
            } catch (err) { console.error("Sipariş çekme hatası:", err); }
        }

        async function siparisNoDurumGuncelle(siparisNo, yeniDurum) {
            if (!siparisNo || !yeniDurum) return;
            try {
                const res = await fetch(`/api/admin/siparisler/grup/${siparisNo}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ durum: yeniDurum })
                });
                const data = await res.json();
                if (data.success) tumSiparisleriGetir();
            } catch (e) { alert("Sunucu hatası oluştu."); }
        }

        // --- YENİ EKLENEN: KULLANICI YÖNETİMİ FONKSİYONLARI ---
        async function kullanicilariGetir() {
            try {
                const res = await fetch('/api/admin/kullanicilar');
                const data = await res.json();

                if(data.success) {
                    const tbody = document.getElementById('kullaniciListesi');
                    tbody.innerHTML = data.kullanicilar.map(k => `
                        <tr>
                            <td class="ps-4 fw-bold text-muted">#${k.id}</td>
                            <td class="fw-bold">${k.ad_soyad}</td>
                            <td>${k.kullanici_adi || '-'}</td>
                            <td>${k.eposta}</td>
                            <td>
                                <span class="badge ${k.rol === 'admin' ? 'bg-danger' : 'bg-primary'} px-3 py-2">
                                    ${k.rol === 'admin' ? '<i class="bi bi-star-fill me-1"></i> ADMIN' : 'KULLANICI'}
                                </span>
                            </td>
                            <td class="text-end pe-4">
                                ${k.rol === 'admin' 
                                    ? `<button onclick="yetkiDegistir(${k.id}, 'user')" class="btn btn-sm btn-outline-warning me-1" title="Yetkiyi Al"><i class="bi bi-arrow-down-circle"></i></button>` 
                                    : `<button onclick="yetkiDegistir(${k.id}, 'admin')" class="btn btn-sm btn-outline-success me-1" title="Admin Yap"><i class="bi bi-arrow-up-circle"></i></button>`}
                                <button onclick="kullaniciSil(${k.id}, '${k.ad_soyad}')" class="btn btn-sm btn-outline-danger" title="Sistemden Sil"><i class="bi bi-trash"></i></button>
                            </td>
                        </tr>
                    `).join('');
                }
            } catch (err) { console.error("Kullanıcıları çekerken hata:", err); }
        }

        async function yetkiDegistir(id, yeniRol) {
            if(!confirm(`Kullanıcının yetkisini "${yeniRol.toUpperCase()}" olarak değiştirmek istediğine emin misin?`)) return;
            
            await fetch(`/api/admin/kullanicilar/${id}/rol`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ rol: yeniRol })
            });
            kullanicilariGetir(); 
        }

        async function kullaniciSil(id, isim) {
            if(!confirm(`DİKKAT: "${isim}" adlı kullanıcıyı sistemden tamamen siliyorsun. Bu işlem geri alınamaz! Emin misin?`)) return;
            
            await fetch(`/api/admin/kullanicilar/${id}`, { method: 'DELETE' });
            kullanicilariGetir(); 
        }

        // İlk açılışta ürünleri getir
        document.addEventListener('DOMContentLoaded', () => {
            adminUrunleriGetir();
        });
    </script>
</body>
</html>
