        function sayfaDegistir(hedefSayfa, element) {

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const urunModal = new bootstrap.Modal(document.getElementById('urunModal'));
        let tumUrunler = [];

        // 1. Ürünleri Çek ve Tabloyu Doldur
        function adminUrunleriGetir() {
            fetch('/api/urunler')
                .then(res => res.json())
                .then(urunler => {
                    tumUrunler = urunler;
                    const liste = document.getElementById("admin-urun-listesi");
                    liste.innerHTML = urunler.map(u => `
                        <tr>
                            <td class="ps-4"><img src="${u.resim_url}" class="table-image"></td>
                            <td class="fw-bold">${u.urun_adi}</td>
                            <td><span class="badge bg-secondary">${u.kategori}</span></td>
                            <td>${parseFloat(u.fiyat).toLocaleString('tr-TR')} TL</td>
                            <td>
                                <span class="badge ${u.stok > 5 ? 'bg-success' : (u.stok > 0 ? 'bg-warning' : 'bg-danger')}">
                                    ${u.stok} Adet
                                </span>
                            </td>
                            <td class="text-end pe-4">
                                <button class="btn btn-sm btn-outline-primary me-2" onclick="modalAc('duzenle', ${u.id})"><i class="bi bi-pencil"></i></button>
                                <button class="btn btn-sm btn-outline-danger" onclick="urunSil(${u.id})"><i class="bi bi-trash"></i></button>
                            </td>
                        </tr>
                    `).join('');
                });
        }

function modalAc(mod, id = null) {
    const form = document.getElementById("urunFormu");
    const kategoriSelect = document.getElementById("kategori");
    
    // Veritabanındaki tüm ürünlerden benzersiz kategorileri al
    const kategoriler = [...new Set(tumUrunler.map(u => u.kategori))];
    
    // Select kutusunu temizle ve veritabanı kategorileriyle doldur
    kategoriSelect.innerHTML = kategoriler.map(kat => 
        `<option value="${kat}">${kat}</option>`
    ).join('');

    form.reset();
    document.getElementById("urun_id").value = id || "";

    if (mod === 'ekle') {
        document.getElementById("modalBaslik").innerText = "Yeni Ürün Ekle";
    } else {
        document.getElementById("modalBaslik").innerText = "Ürünü Düzenle";
        const u = tumUrunler.find(x => x.id === id);
        if(u) {
            document.getElementById("urun_adi").value = u.urun_adi;
            kategoriSelect.value = u.kategori; // Veritabanındaki değeri seçili yap
            document.getElementById("fiyat").value = u.fiyat;
            document.getElementById("stok").value = u.stok;
            document.getElementById("resim_url").value = u.resim_url;
        }
    }
    new bootstrap.Modal(document.getElementById('urunModal')).show();
}        // 3. Ürün Ekle / Güncelle (Backend'e İstek At)
        async function urunKaydet() {
    console.log("Kaydet butonuna tıklandı!");

    const id = document.getElementById("urun_id").value;
    
    // Değerleri alırken kontrol et
    const rawFiyat = document.getElementById("fiyat").value;
    const rawStok = document.getElementById("stok").value;

    const veri = {
        urun_adi: document.getElementById("urun_adi").value,
        kategori: document.getElementById("kategori").value,
        fiyat: parseFloat(rawFiyat),
        stok: parseInt(rawStok),
        resim_url: document.getElementById("resim_url").value,
        aciklama: document.getElementById("aciklama").value
    };

    // KRİTİK KONTROL: Eğer içleri boşsa veritabanına gönderme, kullanıcıyı uyar!
    if (!veri.urun_adi || isNaN(veri.fiyat) || isNaN(veri.stok)) {
        alert("Kral, Fiyat ve Stok kısımlarını sayısal bir değerle doldurman lazım!");
        return; 
    }

    console.log("Sunucuya gönderilen veri:", veri); // Terminalde ne gittiğine bak

    const url = id ? `/api/admin/urunler/${id}` : `/api/admin/urunler`;
    const method = id ? 'PUT' : 'POST';

    try {
        const res = await fetch(url, {
            method: method,
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(veri)
        });
        
        const sonuc = await res.json();
        
        if (sonuc.success) {
            alert("Ürün başarıyla kaydedildi!");
            const modalEl = document.getElementById('urunModal');
            bootstrap.Modal.getInstance(modalEl).hide();
            adminUrunleriGetir();
        } else {
            alert("Veritabanı reddetti: " + sonuc.message);
        }
    } catch (err) {
        console.error(err);
        alert("Bir hata oluştu!");
    }
}
        // 4. Ürün Sil
        async function urunSil(id) {
            if (!confirm("Bu ürünü silmek istediğine emin misin kral?")) return;

            try {
                const res = await fetch(`/api/admin/urunler/${id}`, { method: 'DELETE' });
                const sonuc = await res.json();
                if (sonuc.success) adminUrunleriGetir();
                else alert("Hata: " + sonuc.message);
            } catch (err) {
                console.error(err);
            }
        }

        // Sayfa açıldığında ürünleri listele
        document.addEventListener("DOMContentLoaded", adminUrunleriGetir);

// Sayfa açılır açılmaz siparişleri çeken tetikleyici
document.addEventListener('DOMContentLoaded', () => {
    tumSiparisleriGetir();
});

// 1. TÜM SİPARİŞLERİ GRUPLU VE ADRESLİ GETİRME
async function tumSiparisleriGetir() {
    try {
        const res = await fetch('/api/admin/siparisler');
        const data = await res.json();

        if (data.success) {
            const tbody = document.getElementById('adminSiparisListesi');
            tbody.innerHTML = ''; 

            // Sipariş numarasına göre ürünleri aynı çatıda topla
            const gruplar = data.siparisler.reduce((acc, curr) => {
                if (!acc[curr.siparis_no]) acc[curr.siparis_no] = [];
                acc[curr.siparis_no].push(curr);
                return acc;
            }, {});

            Object.keys(gruplar).forEach(siparisNo => {
                const urunler = gruplar[siparisNo];
                const ilkUrun = urunler[0]; 

                // Ürünleri alt alta listele
                const urunListesiHtml = urunler.map(u => 
                    `<div class="border-bottom py-1">${u.urun_adi} <span class="text-muted">(x${u.adet})</span></div>`
                ).join('');

                const toplamFiyat = urunler.reduce((toplam, u) => toplam + (parseFloat(u.fiyat) * u.adet), 0);

                let badgeClass = 'bg-warning text-dark';
                if (ilkUrun.durum === 'Kargolandı') badgeClass = 'bg-primary';
                if (ilkUrun.durum === 'Teslim Edildi') badgeClass = 'bg-success';
                if (ilkUrun.durum === 'İptal Edildi') badgeClass = 'bg-danger';

                tbody.innerHTML += `
                    <tr>
                        <td><strong>${siparisNo}</strong></td>
                        <td>${ilkUrun.kullanici_eposta}</td>
                        <td>${urunListesiHtml}</td>
                        
                        <!-- ADRES BURADA GÖRÜNECEK -->
                        <td style="max-width: 200px; word-wrap: break-word;"><small class="text-muted">${ilkUrun.adres || 'Adres Yok'}</small></td>
                        
                        <td><strong>${toplamFiyat.toLocaleString('tr-TR')} TL</strong></td>
                        <td><span class="badge ${badgeClass}">${ilkUrun.durum}</span></td>
                        <td>
                            <!-- ONCHANGE İÇİNDE siparisNoDurumGuncelle ÇAĞIRILIYOR (ID DEĞİL, SİPARİŞ NO GİDİYOR) -->
                            <select class="form-select form-select-sm" onchange="siparisNoDurumGuncelle('${siparisNo}', this.value)">
                                <option value="Hazırlanıyor" ${ilkUrun.durum === 'Hazırlanıyor' ? 'selected' : ''}>Hazırlanıyor</option>
                                <option value="Kargolandı" ${ilkUrun.durum === 'Kargolandı' ? 'selected' : ''}>Kargolandı</option>
                                <option value="Teslim Edildi" ${ilkUrun.durum === 'Teslim Edildi' ? 'selected' : ''}>Teslim Edildi</option>
                                <option value="İptal Edildi" ${ilkUrun.durum === 'İptal Edildi' ? 'selected' : ''}>İptal Edildi</option>
                            </select>
                        </td>
                    </tr>
                `;
            });
        }
    } catch (err) { console.error("Sipariş çekme hatası:", err); }
}

// 2. SİPARİŞ DURUMUNU TOPLU GÜNCELLEME (Frontend-Backend Uyumu Sağlandı)
async function siparisNoDurumGuncelle(siparisNo, yeniDurum) {
    if (!siparisNo || !yeniDurum) return;
    
    try {
        // Backend'deki GRUP rotasına gidiyor
        const res = await fetch(`/api/admin/siparisler/grup/${siparisNo}`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ durum: yeniDurum })
        });
        const data = await res.json();
        
        if (data.success) {
          
            tumSiparisleriGetir(); // Ekranı hemen yeni renklerle tazele
        } else {
            alert("Hata: " + data.message);
        }
    } catch (e) {
        console.error("Güncelleme patladı:", e);
        alert("Sunucu hatası oluştu. Backend rotası bulunamadı.");
    }
}

function sayfaDegistir(hedefSayfa, element) {
    // 1. Tüm sayfaları gizle
    document.getElementById('sayfa-dashboard').classList.add('d-none');
    document.getElementById('sayfa-siparisler').classList.add('d-none');
    document.getElementById('sayfa-kullanicilar').classList.add('d-none');
    
    // 2. İstenen sayfayı göster
    document.getElementById('sayfa-' + hedefSayfa).classList.remove('d-none');

    // 3. Menüdeki "active" sınıfını yönet
    // Önce hepsinden 'active' sınıfını sil
    document.querySelectorAll('.nav-link').forEach(link => link.classList.remove('active'));
    // Tıklanana 'active' sınıfını ekle
    element.classList.add('active');

    // 4. Verileri çek (Siparişler için)
    if (hedefSayfa === 'siparisler') {
        tumSiparisleriGetir();
    }
}
