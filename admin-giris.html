<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yönetici Girişi | Serhat Optik</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #0f172a; height: 100vh; display: flex; align-items: center; justify-content: center; font-family: 'Inter', sans-serif; }
        .login-card { background: #fff; padding: 40px; border-radius: 12px; width: 100%; max-width: 400px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .brand-text { color: #0f172a; font-weight: 800; letter-spacing: -0.5px; }
    </style>
</head>
<body>
    <div class="login-card text-center">
        <h3 class="brand-text mb-1">SERHAT OPTİK</h3>
        <p class="text-muted mb-4 small fw-semibold">Yönetim Paneli Güvenli Giriş</p>

        <div id="giris-alani">
            <div class="mb-3">
                <input type="text" id="admin_kimlik" class="form-control form-control-lg bg-light" placeholder="E-posta veya Kullanıcı Adı" required>
            </div>
            <div class="mb-4">
                <input type="password" id="admin_sifre" class="form-control form-control-lg bg-light" placeholder="Şifre" required>
            </div>
            <button type="button" class="btn btn-dark btn-lg w-100 fw-bold" onclick="direktGirisYap(this)">Giriş Yap</button>
        </div>
    </div>

    <script>
        async function direktGirisYap(btn) {
            const giris_kimlik = document.getElementById('admin_kimlik').value;
            const sifre = document.getElementById('admin_sifre').value;
            
            if(!giris_kimlik || !sifre) return alert("Bilgileri eksiksiz gir!");

            const eskiMetin = btn.innerText;
            btn.disabled = true;
            btn.innerText = "Giriş Yapılıyor...";

            try {
                const res = await fetch('/auth/admin-login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ giris_kimlik, sifre })
                });
                
                const data = await res.json();

                if(data.success) {
                    // 🚨 KRİTİK DOKUNUŞ: Hem eski anahtarı hem yeni anahtarı yazıyoruz ki admin.html içeri alsın!
                    localStorage.setItem('serhat_admin_yetkisi', 'onaylandi');
                    localStorage.setItem('serhat_optik_kullanici', JSON.stringify(data.kullanici));
                    
                    // Artık admin.html seni kapı dışarı edemez!
                    window.location.href = '/admin'; 
                } else {
                    alert(data.message);
                    btn.disabled = false;
                    btn.innerText = antiqua;
                    btn.innerText = eskiMetin;
                }
            } catch (err) {
                alert("Sunucu ile bağlantı kurulamadı!");
                btn.disabled = false;
                btn.innerText = eskiMetin;
            }
        }
    </script>
</body>
</html>
