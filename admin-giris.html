<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yönetici Girişi | Serhat Optik</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #0f172a; height: 100vh; display: flex; align-items: center; justify-content: center; font-family: 'Inter', sans-serif; }
        .login-card { background: #fff; padding: 40px; border-radius: 12px; width: 100%; max-width: 400px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .brand-text { color: #0f172a; font-weight: 800; letter-spacing: -0.5px; }
    </style>
</head>
<body>
    <div class="login-card text-center">
        <h3 class="brand-text mb-1">SERHAT OPTİK</h3>
        <p class="text-muted mb-4 small fw-semibold">Yönetim Paneli Güvenli Giriş</p>

        <div id="adim1-alani">
            <div class="mb-3">
                <input type="text" id="admin_kimlik" class="form-control form-control-lg bg-light" placeholder="E-posta veya Kullanıcı Adı" required>
            </div>
            <div class="mb-4">
                <input type="password" id="admin_sifre" class="form-control form-control-lg bg-light" placeholder="Şifre" required>
            </div>
            <button type="button" class="btn btn-dark btn-lg w-100 fw-bold" onclick="kodGonder(this)">Giriş Yap</button>
        </div>

        <div id="adim2-alani" class="d-none">
            <div class="alert alert-success small mb-3">Güvenlik kodu sistemde kayıtlı e-posta adresinize gönderildi.</div>
            <div class="mb-4">
                <input type="text" id="admin_kod" class="form-control form-control-lg text-center fw-bold bg-light" placeholder="0 0 0 0 0 0" maxlength="6" required>
            </div>
            <button type="button" class="btn btn-primary btn-lg w-100 fw-bold" onclick="koduDogrula(this)">Doğrula ve İçeri Gir</button>
            <button type="button" class="btn btn-link text-muted mt-2 w-100 small" onclick="location.reload()">Geri Dön</button>
        </div>
    </div>

    <script>
        let girilenEposta = "";

        async function kodGonder(btn) {
            const giris_kimlik = document.getElementById('admin_kimlik').value;
            const sifre = document.getElementById('admin_sifre').value;
            if(!giris_kimlik || !sifre) return alert("Bilgileri eksiksiz gir!");

            const eskiMetin = btn.innerText;
            btn.disabled = true;
            btn.innerText = "Kontrol ediliyor...";

            try {
                const res = await fetch('/auth/admin-login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ giris_kimlik, sifre })
                });
                const data = await res.json();

                if(data.success) {
                    girilenEposta = data.gercekEposta;
                    document.getElementById('adim1-alani').classList.add('d-none');
                    document.getElementById('adim2-alani').classList.remove('d-none');
                } else {
                    alert(data.message);
                    btn.disabled = false;
                    btn.innerText = eskiMetin;
                }
            } catch (err) {
                alert("Sunucu ile bağlantı kurulamadı!");
                btn.disabled = false;
                btn.innerText = eskiMetin;
            }
        }

        async function koduDogrula(btn) {
    const kod = document.getElementById('admin_kod').value;
    console.log("1. Butona basıldı. Gönderilecek kod:", kod);
    
    if(!kod) return alert("Kodu girmedin!");

    const eskiMetin = btn.innerText;
    btn.disabled = true;
    btn.innerText = "Doğrulanıyor...";

    try {
        console.log("2. Sunucuya istek atılıyor... E-posta:", girilenEposta);
        const res = await fetch('/auth/admin-verify', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ eposta: girilenEposta, kod })
        });
        
        console.log("3. Sunucudan cevap geldi! HTTP Status:", res.status);
        const data = await res.json();
        console.log("4. Gelen veri okundu:", data);

        if(data.success) {
            localStorage.setItem('serhat_admin_yetkisi', 'onaylandi');
            window.location.href = '/admin'; 
        } else {
            alert(data.message);
            btn.disabled = false;
            btn.innerText = eskiMetin;
        }
    } catch (err) {
        console.error("CATCH HATASI (Bağlantı koptu):", err);
        alert("Sunucu ile bağlantı kurulamadı veya sunucu cevap vermedi!");
        btn.disabled = false;
        btn.innerText = eskiMetin;
    }
}
    </script>
</body>
</html>
